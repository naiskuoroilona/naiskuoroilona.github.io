<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konsertit | Naiskuoro Ilona</title>
    <link rel="stylesheet" href="header.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            background: #f5f5f5;
        }
        #wrapper {
            max-width: 960px;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #header {
            border-bottom: 1px solid #ddd;
        }
        #content {
            padding: 20px 30px;
        }
        .pagetitle {
            font-size: 28px;
            margin-bottom: 20px;
            color: #222;
        }
        .entry {
            line-height: 1.6;
        }
        .entry img {
            max-width: 100%;
            height: auto;
        }
        .post {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .post h2 a {
            color: #333;
            text-decoration: none;
        }
        .post h2 a:hover {
            color: #0073aa;
        }
        .postmetadata {
            color: #888;
            font-size: 13px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .gallery img {
            max-width: 200px;
            height: auto;
        }
        a {
            color: #0073aa;
        }
        .skip-content {
            display: none;
        }
        .concert-card {
            background: #f9f9f9;
            border-left: 4px solid #347b7a;
            border-radius: 6px;
            padding: 18px 22px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        .concert-card h3 {
            margin: 0 0 6px;
            font-size: 18px;
            color: #222;
        }
        .concert-card p {
            margin: 0;
            color: #555;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <div id="header" class="clear">
		</div><!--end header-->
<div id="content" class="pad">
										<h1 class="pagetitle">Konsertit 2025</h1>
			<div class="entry page clear">
				<div class="concert-card">
					<h3>Naistenpäivän konsertti 7.3.2025</h3>
					<p>Keravan kirjastolla klo 13</p>
				</div>
				<div class="concert-card">
					<h3>Kevätkonsertti 10.5.2025</h3>
					<p>Keravan seurakuntatalo klo 18</p>
				</div>
</div><!--end entry-->


			</div><!--end content-->
    </div>
    <script src="nav.js"></script>
</body>
</html>
