# Symlinked from /etc/nginx/conf.d/ilona.conf by deploy/install.sh.
# Edit here in the repo, then `sudo nginx -t && sudo systemctl reload nginx`.
# Replace example.com with the real domain before enabling.

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # Upload size must match multer limit in server.js (10 MB).
    client_max_body_size 10M;

    # Long-ish timeouts so admin saves of larger pages don't get cut off.
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    access_log /var/log/nginx/ilona.access.log;
    error_log  /var/log/nginx/ilona.error.log;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Express handles its own keepalive; no buffering needed for HTML.
        proxy_buffering off;
    }
}

# After HTTPS is set up (certbot --nginx), the block above will be
# rewritten to redirect to 443 and a second server { listen 443 ssl; ... }
# block will be added by certbot. No manual TLS config needed here.
